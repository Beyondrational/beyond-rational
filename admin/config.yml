              - { label: "Paragraph 1",  name: "body_p1",  widget: "text"   }
              - { label: "Paragraph 2",  name: "body_p2",  widget: "text"   }
              - { label: "Paragraph 3",  name: "body_p3",  widget: "text"   }
          - label: "Gallery"
            name: "gallery"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Image", name: "image", widget: "image"  }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Meta",  name: "meta",  widget: "string" }
          - label: "Results"
            name: "results"
            widget: "object"
            fields:
              - { label: "Eyebrow",      name: "eyebrow",  widget: "string" }
              - { label: "Title line 1", name: "title_l1", widget: "string" }
              - { label: "Title line 2", name: "title_l2", widget: "string" }
              - { label: "Note",         name: "note",     widget: "text"   }
          - label: "Closing CTA"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Title line 1", name: "title_l1", widget: "string" }
