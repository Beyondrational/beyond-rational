# Decap CMS configuration

backend:
  name: github
  repo: Beyondrational/beyond-rational
  branch: main
  # OAuth proxy (Cloudflare Worker) that completes "Login with GitHub".
  # See DECAP-SETUP.md for the full walkthrough.
  base_url: https://br-cms-auth.rasmus-177.workers.dev

media_folder: "assets"
public_folder: "assets"

site_url: https://beyondrational.github.io/beyond-rational
display_url: https://beyondrational.github.io/beyond-rational

collections:

  # =============== SITE-WIDE (nav, footer, loader, cookie banner — shown on every page) ===============
  - name: "site-en"
    label: "Site settings — EN"
    files:
      - file: "content/site.en.json"
        name: "site-en"
        label: "Site-wide chrome (English)"
        fields:
          - { label: "Logo (nav + footer, every page)", name: "logo", widget: "image" }
          - label: "Nav links"
            name: "nav"
            widget: "object"
            fields:
              - { label: "Products", name: "products", widget: "string" }
              - { label: "Projects", name: "projects", widget: "string" }
              - { label: "Contact",  name: "contact",  widget: "string" }
          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Brand tagline", name: "brand_tagline", widget: "text"   }
              - { label: "Email",         name: "email",         widget: "string" }
              - { label: "Address",       name: "address",       widget: "string" }
              - { label: "Copyright",     name: "copyright",     widget: "string" }
              - { label: "\"Product\" column heading", name: "product_heading", widget: "string" }
              - { label: "Aisti link text",              name: "aisti_label",     widget: "string" }
              - { label: "\"Office\" column heading",   name: "office_heading",  widget: "string" }
              - { label: "Projects link text",           name: "projects_label",  widget: "string" }
              - { label: "\"Contact\" column heading",  name: "contact_heading", widget: "string" }
              - { label: "Privacy policy link text",     name: "privacy_label",   widget: "string", hint: "The linked page (privatlivspolitik.html) stays Danish-only regardless of site language" }
              - { label: "Terms link text",               name: "terms_label",     widget: "string", hint: "The linked page (betalingsbetingelser.html) stays Danish-only regardless of site language" }
              - { label: "Design system link text",       name: "design_system_label",   widget: "string" }
              - { label: "Design system version string",  name: "design_system_version", widget: "string" }
          - label: "Page loader"
            name: "loader"
            widget: "object"
            fields:
              - { label: "Brand (top-left)",   name: "brand",   widget: "string" }
              - { label: "\"Loading\" label", name: "loading", widget: "string" }
          - label: "Cookie banner"
            name: "cookie"
            widget: "object"
            hint: "Injected on every page by br.js — not tied to any page's HTML."
            fields:
              - { label: "Text (HTML allowed for the privacy-policy link)", name: "text",    widget: "text"   }
              - { label: "Decline button",                                  name: "decline", widget: "string" }
              - { label: "Accept button",                                   name: "accept",  widget: "string" }
          - label: "Misc shared strings"
            name: "misc"
            widget: "object"
            fields:
              - { label: "Scroll hint",                 name: "scroll_hint",       widget: "string" }
              - { label: "Back-to-home link",            name: "back_home",         widget: "string" }
              - { label: "Back-to-products link",         name: "back_products",     widget: "string" }
              - { label: "Select dropdown placeholder",   name: "select_placeholder", widget: "string" }
              - { label: "Newsletter subscribe button",   name: "subscribe",         widget: "string" }
              - { label: "\"Email\" field label",        name: "email_label",       widget: "string" }
              - { label: "\"Phone\" field label",        name: "phone_label",       widget: "string" }
              - { label: "\"Office\" field label",       name: "office_label",      widget: "string" }
              - { label: "\"Hours\" field label",        name: "hours_label",       widget: "string" }

  - name: "site-da"
    label: "Site settings — DA"
    files:
      - file: "content/site.da.json"
        name: "site-da"
        label: "Site-wide chrome (Danish)"
        fields:
          - { label: "Logo (nav + footer, every page)", name: "logo", widget: "image" }
          - label: "Nav links"
            name: "nav"
            widget: "object"
            fields:
              - { label: "Products", name: "products", widget: "string" }
              - { label: "Projects", name: "projects", widget: "string" }
              - { label: "Contact",  name: "contact",  widget: "string" }
          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Brand tagline", name: "brand_tagline", widget: "text"   }
              - { label: "Email",         name: "email",         widget: "string" }
              - { label: "Address",       name: "address",       widget: "string" }
              - { label: "Copyright",     name: "copyright",     widget: "string" }
              - { label: "\"Product\" column heading", name: "product_heading", widget: "string" }
              - { label: "Aisti link text",              name: "aisti_label",     widget: "string" }
              - { label: "\"Office\" column heading",   name: "office_heading",  widget: "string" }
              - { label: "Projects link text",           name: "projects_label",  widget: "string" }
              - { label: "\"Contact\" column heading",  name: "contact_heading", widget: "string" }
              - { label: "Privacy policy link text",     name: "privacy_label",   widget: "string", hint: "The linked page (privatlivspolitik.html) stays Danish-only regardless of site language" }
              - { label: "Terms link text",               name: "terms_label",     widget: "string", hint: "The linked page (betalingsbetingelser.html) stays Danish-only regardless of site language" }
              - { label: "Design system link text",       name: "design_system_label",   widget: "string" }
              - { label: "Design system version string",  name: "design_system_version", widget: "string" }
          - label: "Page loader"
            name: "loader"
            widget: "object"
            fields:
              - { label: "Brand (top-left)",   name: "brand",   widget: "string" }
              - { label: "\"Loading\" label", name: "loading", widget: "string" }
          - label: "Cookie banner"
            name: "cookie"
            widget: "object"
            hint: "Injected on every page by br.js — not tied to any page's HTML."
            fields:
              - { label: "Text (HTML allowed for the privacy-policy link)", name: "text",    widget: "text"   }
              - { label: "Decline button",                                  name: "decline", widget: "string" }
              - { label: "Accept button",                                   name: "accept",  widget: "string" }
          - label: "Misc shared strings"
            name: "misc"
            widget: "object"
            fields:
              - { label: "Scroll hint",                 name: "scroll_hint",       widget: "string" }
              - { label: "Back-to-home link",            name: "back_home",         widget: "string" }
              - { label: "Back-to-products link",         name: "back_products",     widget: "string" }
              - { label: "Select dropdown placeholder",   name: "select_placeholder", widget: "string" }
              - { label: "Newsletter subscribe button",   name: "subscribe",         widget: "string" }
              - { label: "\"Email\" field label",        name: "email_label",       widget: "string" }
              - { label: "\"Phone\" field label",        name: "phone_label",       widget: "string" }
              - { label: "\"Office\" field label",       name: "office_label",      widget: "string" }
              - { label: "\"Hours\" field label",        name: "hours_label",       widget: "string" }

  # =============== HOME ===============
  - name: "home-en"
    label: "Home — EN"
    files:
      - file: "content/home.en.json"
        name: "home-en"
        label: "Home page — EN"
        fields:

          - { label: "Loader tag (top-right of the loading screen)", name: "loader_tag", widget: "string" }

          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow left",          name: "eyebrow_left",  widget: "string" }
              - { label: "Eyebrow right",         name: "eyebrow_right", widget: "string" }
              - { label: "Title line 1",          name: "title_l1",      widget: "string" }
              - { label: "Title line 2 (emphasised)", name: "title_l2_em", widget: "string" }
              - { label: "Subtitle",              name: "subtitle",      widget: "text"   }
              - { label: "Primary CTA",           name: "cta_primary",   widget: "string" }
              - { label: "Secondary CTA",         name: "cta_secondary", widget: "string" }
              - { label: "Hero background image", name: "bg_image",      widget: "image"  }

          - label: "The range (4-image product grid)"
            name: "range"
            widget: "object"
            fields:
              - { label: "Section label", name: "section_label", widget: "string" }
              - { label: "Meta tag",      name: "meta",          widget: "string" }
              - { label: "Intro",         name: "intro",         widget: "text"   }
              - { label: "Link label",    name: "link_label",    widget: "string" }
              - label: "Products"
                name: "items"
                widget: "list"
                summary: "{{fields.name}}"
                fields:
                  - { label: "Name",  name: "name",  widget: "string" }
                  - { label: "Image", name: "image", widget: "image"  }
                  - { label: "Tag",   name: "tag",   widget: "string", required: false, hint: "Not currently displayed, kept for future use" }
                  - { label: "Link",  name: "href",  widget: "string", hint: "e.g. product-aisti.html, product-wuud.html" }

          - label: "Mission statement"
            name: "process"
            widget: "object"
            fields:
              - { label: "Section label",        name: "section_label", widget: "string" }
              - { label: "Title line 1",         name: "title_l1",      widget: "string" }
              - { label: "Title line 2 (em)",    name: "title_l2_em",   widget: "string" }
              - { label: "Paragraph 1",          name: "body_p1",       widget: "text"   }
              - { label: "Paragraph 2",          name: "body_p2",       widget: "text"   }
              - { label: "Image",                name: "image",         widget: "image"  }

          - label: "Office"
            name: "studio"
            widget: "object"
            fields:
              - { label: "Section label",     name: "section_label", widget: "string" }
              - { label: "Title line 1",      name: "title_l1",      widget: "string" }
              - { label: "Title line 2 (em)", name: "title_l2_em",   widget: "string" }
              - { label: "Founded year",             name: "stat_founded",        widget: "string" }
              - { label: "Founded year — label",     name: "stat_founded_label",  widget: "string" }
              - { label: "Supplier count",           name: "stat_people",         widget: "string" }
              - { label: "Supplier count — label",   name: "stat_people_label",   widget: "string" }
              - { label: "In business since",        name: "stat_studios",        widget: "string" }
              - { label: "In business since — label", name: "stat_studios_label", widget: "string" }
              - { label: "Body",              name: "body",          widget: "text"   }
              - { label: "Image",             name: "image",         widget: "image"  }
              - { label: "Link label",        name: "link_label",    widget: "string", default: "Contact" }

          - label: "Cases"
            name: "cases"
            widget: "object"
            fields:
              - { label: "Section label", name: "section_label", widget: "string" }
              - { label: "Link label",    name: "link_label",    widget: "string" }
              - label: "Items"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Link",    name: "href",    widget: "string", hint: "e.g. case-angtvatten-22.html" }
                  - { label: "Image",   name: "image",   widget: "image", required: false }
                  - { label: "Eyebrow", name: "eyebrow", widget: "string" }
                  - { label: "Title",   name: "title",   widget: "string" }
                  - { label: "Meta 1",  name: "meta1",   widget: "string" }
                  - { label: "Meta 2",  name: "meta2",   widget: "text"   }

          - label: "Closing CTA"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Section label",     name: "section_label", widget: "string" }
              - { label: "Title line 1",      name: "title_l1",      widget: "string" }
              - { label: "Title line 2 (em)", name: "title_l2_em",   widget: "string" }
              - { label: "Body",              name: "body",          widget: "text"   }
              - { label: "Email",             name: "email",         widget: "string" }

  # =============== HOME ===============
  - name: "home-da"
    label: "Home — DA"
    files:
      - file: "content/home.da.json"
        name: "home-da"
        label: "Home page — DA"
        fields:

          - { label: "Loader tag (top-right of the loading screen)", name: "loader_tag", widget: "string" }

          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow left",          name: "eyebrow_left",  widget: "string" }
              - { label: "Eyebrow right",         name: "eyebrow_right", widget: "string" }
              - { label: "Title line 1",          name: "title_l1",      widget: "string" }
              - { label: "Title line 2 (emphasised)", name: "title_l2_em", widget: "string" }
              - { label: "Subtitle",              name: "subtitle",      widget: "text"   }
              - { label: "Primary CTA",           name: "cta_primary",   widget: "string" }
              - { label: "Secondary CTA",         name: "cta_secondary", widget: "string" }
              - { label: "Hero background image", name: "bg_image",      widget: "image"  }

          - label: "The range (4-image product grid)"
            name: "range"
            widget: "object"
            fields:
              - { label: "Section label", name: "section_label", widget: "string" }
              - { label: "Meta tag",      name: "meta",          widget: "string" }
              - { label: "Intro",         name: "intro",         widget: "text"   }
              - { label: "Link label",    name: "link_label",    widget: "string" }
              - label: "Products"
                name: "items"
                widget: "list"
                summary: "{{fields.name}}"
                fields:
                  - { label: "Name",  name: "name",  widget: "string" }
                  - { label: "Image", name: "image", widget: "image"  }
                  - { label: "Tag",   name: "tag",   widget: "string", required: false, hint: "Not currently displayed, kept for future use" }
                  - { label: "Link",  name: "href",  widget: "string", hint: "e.g. product-aisti.html, product-wuud.html" }

          - label: "Mission statement"
            name: "process"
            widget: "object"
            fields:
              - { label: "Section label",        name: "section_label", widget: "string" }
              - { label: "Title line 1",         name: "title_l1",      widget: "string" }
              - { label: "Title line 2 (em)",    name: "title_l2_em",   widget: "string" }
              - { label: "Paragraph 1",          name: "body_p1",       widget: "text"   }
              - { label: "Paragraph 2",          name: "body_p2",       widget: "text"   }
              - { label: "Image",                name: "image",         widget: "image"  }

          - label: "Office"
            name: "studio"
            widget: "object"
            fields:
              - { label: "Section label",     name: "section_label", widget: "string" }
              - { label: "Title line 1",      name: "title_l1",      widget: "string" }
              - { label: "Title line 2 (em)", name: "title_l2_em",   widget: "string" }
              - { label: "Founded year",             name: "stat_founded",        widget: "string" }
              - { label: "Founded year — label",     name: "stat_founded_label",  widget: "string" }
              - { label: "Supplier count",           name: "stat_people",         widget: "string" }
              - { label: "Supplier count — label",   name: "stat_people_label",   widget: "string" }
              - { label: "In business since",        name: "stat_studios",        widget: "string" }
              - { label: "In business since — label", name: "stat_studios_label", widget: "string" }
              - { label: "Body",              name: "body",          widget: "text"   }
              - { label: "Image",             name: "image",         widget: "image"  }
              - { label: "Link label",        name: "link_label",    widget: "string", default: "Contact" }

          - label: "Cases"
            name: "cases"
            widget: "object"
            fields:
              - { label: "Section label", name: "section_label", widget: "string" }
              - { label: "Link label",    name: "link_label",    widget: "string" }
              - label: "Items"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Link",    name: "href",    widget: "string", hint: "e.g. case-angtvatten-22.html" }
                  - { label: "Image",   name: "image",   widget: "image", required: false }
                  - { label: "Eyebrow", name: "eyebrow", widget: "string" }
                  - { label: "Title",   name: "title",   widget: "string" }
                  - { label: "Meta 1",  name: "meta1",   widget: "string" }
                  - { label: "Meta 2",  name: "meta2",   widget: "text"   }

          - label: "Closing CTA"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Section label",     name: "section_label", widget: "string" }
              - { label: "Title line 1",      name: "title_l1",      widget: "string" }
              - { label: "Title line 2 (em)", name: "title_l2_em",   widget: "string" }
              - { label: "Body",              name: "body",          widget: "text"   }
              - { label: "Email",             name: "email",         widget: "string" }

  # =============== CONTACT ===============
  - name: "contact-page-en"
    label: "Contact — EN"
    files:
      - file: "content/contact.en.json"
        name: "contact-page-en"
        label: "Contact page — EN"
        fields:

          - { label: "Loader tag (top-right of the loading screen)", name: "loader_tag", widget: "string" }

          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow",     name: "eyebrow",  widget: "string" }
              - { label: "Title line 1", name: "title_l1", widget: "string" }
              - { label: "Title line 2", name: "title_l2", widget: "string" }
              - { label: "Lede",        name: "lede",     widget: "text"   }
              - { label: "Hero image",  name: "image",    widget: "image"  }

          - label: "Form section"
            name: "form_section"
            widget: "object"
            fields:
              - { label: "Section label", name: "section_label", widget: "string" }
              - { label: "Title line 1",  name: "title_l1",      widget: "string" }
              - { label: "Title line 2",  name: "title_l2",      widget: "string" }
              - { label: "Intro",         name: "intro",         widget: "text"   }

              - label: "Contact info shown next to forms"
                name: "contact_info"
                widget: "object"
                fields:
                  - { label: "Email",  name: "email",  widget: "string" }
                  - { label: "Phone",  name: "phone",  widget: "string" }
                  - { label: "Office", name: "office", widget: "string" }
                  - { label: "Hours",  name: "hours",  widget: "string" }

              - label: "Tab labels"
                name: "tabs"
                widget: "object"
                fields:
                  - { label: "Sample box tab",  name: "sample",  widget: "string" }
                  - { label: "Specify tab",     name: "specify", widget: "string" }
                  - { label: "Information tab", name: "info",    widget: "string" }
                  - { label: "Other tab",       name: "other",   widget: "string" }

              - label: "Form 1 — Sample box"
                name: "form_sample"
                widget: "object"
                fields:
                  - { label: "Name label",              name: "name_label",          widget: "string" }
                  - { label: "Email label",              name: "email_label",         widget: "string" }
                  - { label: "Phone label",              name: "phone_label",         widget: "string" }
                  - { label: "Company label",            name: "company_label",       widget: "string" }
                  - { label: "Finish label",             name: "finish_label",        widget: "string" }
                  - { label: "Finish placeholder",       name: "finish_placeholder",  widget: "string" }
                  - { label: "Address label",            name: "address_label",       widget: "string" }
                  - { label: "Address placeholder",      name: "address_placeholder", widget: "string" }
                  - { label: "Submit button",            name: "submit_label",        widget: "string" }

              - label: "Form 2 — Specify for project"
                name: "form_specify"
                widget: "object"
                fields:
                  - { label: "Name label",         name: "name_label",         widget: "string" }
                  - { label: "Email label",        name: "email_label",        widget: "string" }
                  - { label: "Role label",         name: "role_label",         widget: "string" }
                  - label: "Role options"
                    name: "role_options"
                    widget: "list"
                    summary: "{{fields.value}}"
                    fields:
                      - { label: "Option", name: "value", widget: "string" }
                  - { label: "Company label",      name: "company_label",      widget: "string" }
                  - { label: "Project name label",  name: "project_label",      widget: "string" }
                  - { label: "Project type label",  name: "type_label",         widget: "string" }
                  - label: "Project type options"
                    name: "type_options"
                    widget: "list"
                    summary: "{{fields.value}}"
                    fields:
                      - { label: "Option", name: "value", widget: "string" }
                  - { label: "Area label",           name: "area_label",         widget: "string" }
                  - { label: "Area placeholder",     name: "area_placeholder",   widget: "string" }
                  - { label: "Deadline label",       name: "deadline_label",     widget: "string" }
                  - { label: "Brief label",          name: "brief_label",        widget: "string" }
                  - { label: "Brief placeholder",    name: "brief_placeholder",  widget: "text"   }
                  - { label: "Submit button",        name: "submit_label",       widget: "string" }

              - label: "Form 3 — Information"
                name: "form_info"
                widget: "object"
                fields:
                  - { label: "Name label",    name: "name_label",    widget: "string" }
                  - { label: "Email label",   name: "email_label",   widget: "string" }
                  - { label: "Company label", name: "company_label", widget: "string" }
                  - { label: "Kind label",    name: "kind_label",    widget: "string" }
                  - label: "Kind options"
                    name: "kind_options"
                    widget: "list"
                    summary: "{{fields.value}}"
                    fields:
                      - { label: "Option", name: "value", widget: "string" }
                  - { label: "Message label",       name: "msg_label",       widget: "string" }
                  - { label: "Message placeholder", name: "msg_placeholder", widget: "string" }
                  - { label: "Submit button",       name: "submit_label",    widget: "string" }

              - label: "Form 4 — Other"
                name: "form_other"
                widget: "object"
                fields:
                  - { label: "Name label",          name: "name_label",       widget: "string" }
                  - { label: "Email label",         name: "email_label",      widget: "string" }
                  - { label: "Company label",       name: "company_label",    widget: "string" }
                  - { label: "Message label",       name: "msg_label",        widget: "string" }
                  - { label: "Message placeholder", name: "msg_placeholder",  widget: "string" }
                  - { label: "Submit button",       name: "submit_label",     widget: "string" }

          - label: "Contact cards"
            name: "contact_cards"
            widget: "object"
            fields:
              - { label: "Section label", name: "section_label", widget: "string" }
              - { label: "Title",         name: "title",         widget: "string" }
              - { label: "Intro",         name: "intro",         widget: "string" }

              - label: "Morten"
                name: "morten"
                widget: "object"
                fields:
                  - { label: "Eyebrow", name: "eyebrow", widget: "string" }
                  - { label: "Name",    name: "name",    widget: "string" }
                  - { label: "Role",    name: "role",    widget: "string" }
                  - { label: "Email",   name: "email",   widget: "string" }
                  - { label: "Phone",   name: "phone",   widget: "string" }
                  - { label: "Photo",   name: "photo",   widget: "image" }

              - label: "Rasmus"
                name: "rasmus"
                widget: "object"
                fields:
                  - { label: "Eyebrow", name: "eyebrow", widget: "string" }
                  - { label: "Name",    name: "name",    widget: "string" }
                  - { label: "Role",    name: "role",    widget: "string" }
                  - { label: "Email",   name: "email",   widget: "string" }
