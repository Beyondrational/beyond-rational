# Decap CMS configuration

backend:
  name: github
  repo: Beyondrational/beyond-rational
  branch: main
  # OAuth proxy (Cloudflare Worker) that completes "Login with GitHub".
  # See DECAP-SETUP.md for the full walkthrough.
  base_url: https://br-cms-auth.rasmus-177.workers.dev

media_folder: "assets"
public_folder: "assets"

site_url: https://beyondrational.github.io/beyond-rational
display_url: https://beyondrational.github.io/beyond-rational

collections:

  # =============== HOME ===============
  - name: "home"
    label: "Home"
    files:
      - file: "content/home.json"
        name: "home"
        label: "Home page"
        fields:

          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow left",          name: "eyebrow_left",  widget: "string" }
              - { label: "Eyebrow right",         name: "eyebrow_right", widget: "string" }
              - { label: "Title line 1",          name: "title_l1",      widget: "string" }
              - { label: "Title line 2 (emphasised)", name: "title_l2_em", widget: "string" }
              - { label: "Subtitle",              name: "subtitle",      widget: "text"   }
              - { label: "Primary CTA",           name: "cta_primary",   widget: "string" }
              - { label: "Secondary CTA",         name: "cta_secondary", widget: "string" }
              - { label: "Hero background image", name: "bg_image",      widget: "image"  }

          - label: "The range (Beyond Rational + products)"
            name: "range"
            widget: "object"
            fields:
              - { label: "Section label", name: "section_label", widget: "string" }
              - { label: "Meta tag",      name: "meta",          widget: "string" }
              - { label: "Intro",         name: "intro",         widget: "text"   }
              - { label: "Image",         name: "image",         widget: "image"  }
              - { label: "Link label",    name: "link_label",    widget: "string" }
              - label: "Products"
                name: "items"
                widget: "list"
                summary: "{{fields.name}}"
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Tag",  name: "tag",  widget: "string" }
                  - { label: "Link", name: "href", widget: "string", hint: "e.g. product.html, product-wuud.html" }

          - label: "Manifesto"
            name: "manifesto"
            widget: "object"
            fields:
              - { label: "Section label", name: "section_label", widget: "string" }
              - label: "Items"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Number",   name: "num",       widget: "string" }
                  - { label: "Text pre", name: "text_pre",  widget: "string" }
                  - { label: "Emphasis", name: "text_em",   widget: "string" }
                  - { label: "Text post",name: "text_post", widget: "string", required: false }

          - label: "What we make"
            name: "what_we_make"
            widget: "object"
            fields:
              - { label: "Section label", name: "section_label", widget: "string" }
              - { label: "Body",          name: "body",          widget: "text"   }
              - { label: "Image",         name: "image",         widget: "image"  }

          - label: "Process"
            name: "process"
            widget: "object"
            fields:
              - { label: "Section label",        name: "section_label", widget: "string" }
              - { label: "Title line 1",         name: "title_l1",      widget: "string" }
              - { label: "Title line 2 (em)",    name: "title_l2_em",   widget: "string" }
              - { label: "Paragraph 1",          name: "body_p1",       widget: "text"   }
              - { label: "Paragraph 2",          name: "body_p2",       widget: "text"   }
              - { label: "Image",                name: "image",         widget: "image"  }

          - label: "Studio"
            name: "studio"
            widget: "object"
            fields:
              - { label: "Section label",     name: "section_label", widget: "string" }
              - { label: "Title line 1",      name: "title_l1",      widget: "string" }
              - { label: "Title line 2 (em)", name: "title_l2_em",   widget: "string" }
              - { label: "Founded year",      name: "stat_founded",  widget: "string" }
              - { label: "People count",      name: "stat_people",   widget: "string" }
              - { label: "Locations",         name: "stat_studios",  widget: "string" }
              - { label: "Body",              name: "body",          widget: "text"   }
              - { label: "Image",             name: "image",         widget: "image"  }

          - label: "Cases"
            name: "cases"
            widget: "object"
            fields:
              - { label: "Section label", name: "section_label", widget: "string" }
              - { label: "Link label",    name: "link_label",    widget: "string" }
              - label: "Items"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Image",   name: "image",   widget: "image"  }
                  - { label: "Eyebrow", name: "eyebrow", widget: "string" }
                  - { label: "Title",   name: "title",   widget: "string" }
                  - { label: "Meta 1",  name: "meta1",   widget: "string" }
                  - { label: "Meta 2",  name: "meta2",   widget: "text"   }

          - label: "Closing CTA"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Section label",     name: "section_label", widget: "string" }
              - { label: "Title line 1",      name: "title_l1",      widget: "string" }
              - { label: "Title line 2 (em)", name: "title_l2_em",   widget: "string" }
              - { label: "Body",              name: "body",          widget: "text"   }
              - { label: "Email",             name: "email",         widget: "string" }

  # =============== FOUNDERS ===============
  - name: "founders"
    label: "Founders"
    files:
      - file: "content/founders.json"
        name: "founders"
        label: "Founders"
        fields:
          - { label: "Section label", name: "section_label", widget: "string" }
          - { label: "Title line 1",  name: "title_l1",      widget: "string" }
          - { label: "Title line 2",  name: "title_l2",      widget: "string" }
          - { label: "Intro",         name: "intro",         widget: "text"   }

          - label: "Morten"
            name: "morten"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Name",    name: "name",    widget: "string" }
              - { label: "Role",    name: "role",    widget: "string" }
              - { label: "Email",   name: "email",   widget: "string" }
              - { label: "Phone",   name: "phone",   widget: "string" }
              - { label: "Photo",   name: "photo",   widget: "image" }

          - label: "Rasmus"
            name: "rasmus"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Name",    name: "name",    widget: "string" }
              - { label: "Role",    name: "role",    widget: "string" }
              - { label: "Email",   name: "email",   widget: "string" }
              - { label: "Studio",  name: "studio",  widget: "string" }
              - { label: "Photo",   name: "photo",   widget: "image" }

  # =============== PROJECTS ===============
  - name: "projects"
    label: "Projects"
    files:
      - file: "content/projects.json"
        name: "projects"
        label: "Projects page"
        fields:

          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow",       name: "eyebrow",   widget: "string" }
              - { label: "Title line 1",  name: "title_l1",  widget: "string" }
              - { label: "Title line 2",  name: "title_l2",  widget: "string" }
              - { label: "Subtitle",      name: "subtitle",  widget: "text"   }

              - { label: "Hero background image", name: "bg_image", widget: "image", required: false }
          - label: "Image gallery (6 cells)"
            name: "gallery"
            widget: "list"
            min: 1
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Meta",  name: "meta",  widget: "string" }

          - label: "Project list"
            name: "list"
            widget: "list"
            fields:
              - { label: "Number", name: "num",   widget: "string" }
              - { label: "Title",  name: "title", widget: "string" }
              - { label: "Meta",   name: "meta",  widget: "string" }
              - { label: "Year",   name: "year",  widget: "string" }

  # =============== WUUD ===============
  - name: "wuud"
    label: "Wuud"
    files:
      - file: "content/wuud.json"
        name: "wuud"
        label: "Wuud page"
        fields:

          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title",   name: "title",   widget: "string" }
              - { label: "Lede",    name: "lede",    widget: "text"   }
              - { label: "Hero background image", name: "bg_image", widget: "image", required: false }
          - { label: "Hero note (under finishes)", name: "hero_note", widget: "text" }

          - label: "The idea"
            name: "idea"
            widget: "object"
            fields:
              - { label: "Eyebrow",      name: "eyebrow",  widget: "string" }
              - { label: "Title line 1", name: "title_l1", widget: "string" }
              - { label: "Title line 2", name: "title_l2", widget: "string" }
              - label: "Points (3)"
                name: "points"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - { label: "Number", name: "num",   widget: "string" }
                  - { label: "Title",  name: "title", widget: "string" }
                  - { label: "Body",   name: "body",  widget: "text"   }
              - { label: "Species label", name: "species_label", widget: "string" }
              - { label: "Wood species",  name: "species",       widget: "list"   }

          - label: "Gallery heading"
            name: "gallery_head"
            widget: "object"
            fields:
              - { label: "Eyebrow",      name: "eyebrow",  widget: "string" }
              - { label: "Title line 1", name: "title_l1", widget: "string" }
              - { label: "Title line 2", name: "title_l2", widget: "string" }
              - { label: "Body",         name: "body",     widget: "text"   }

          - label: "Image gallery"
            name: "gallery"
            label_singular: "Image"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Title", name: "title", widget: "string", required: false }
              - { label: "Meta",  name: "meta",  widget: "string", required: false }

          - label: "Spec"
            name: "spec"
            widget: "object"
            fields:
              - { label: "Eyebrow",      name: "eyebrow",  widget: "string" }
              - { label: "Title line 1", name: "title_l1", widget: "string" }
              - { label: "Title line 2", name: "title_l2", widget: "string" }
              - label: "Rows"
                name: "rows"
                widget: "list"
                summary: "{{fields.key}}: {{fields.value}}"
                fields:
                  - { label: "Key",   name: "key",   widget: "string" }
                  - { label: "Value", name: "value", widget: "string" }

          - label: "Closing CTA"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Title line 1", name: "title_l1", widget: "string" }
              - { label: "Title line 2", name: "title_l2", widget: "string" }
              - { label: "Lede",         name: "lede",     widget: "text"   }

  # =============== PRODUCT (Aisti tile page) ===============
  - name: "product"
    label: "Product — Aisti"
    files:
      - file: "content/product.json"
        name: "product"
        label: "Product page (Aisti)"
        fields:

          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title",   name: "title",   widget: "string" }
              - { label: "Lede",    name: "lede",    widget: "text"   }

              - { label: "Hero background image", name: "bg_image", widget: "image", required: false }
          - label: "Material study"
            name: "material"
            widget: "object"
            fields:
              - { label: "Eyebrow",        name: "eyebrow",  widget: "string" }
              - { label: "Title line 1",   name: "title_l1", widget: "string" }
              - { label: "Title line 2",   name: "title_l2", widget: "string" }
              - { label: "Title line 3",   name: "title_l3", widget: "string" }
              - { label: "Paragraph 1",    name: "body_p1",  widget: "text"   }
              - { label: "Paragraph 2",    name: "body_p2",  widget: "text"   }

          - label: "What we supply"
            name: "supply"
            widget: "object"
            fields:
              - { label: "Section label", name: "section_label", widget: "string" }
              - { label: "Body",          name: "body",          widget: "text"   }
              - { label: "Image",         name: "image",         widget: "image"  }

          - label: "Technology (foam-forming)"
            name: "technology"
            widget: "object"
            fields:
              - { label: "Section label", name: "section_label", widget: "string" }
              - { label: "Title line 1",  name: "title_l1",      widget: "string" }
              - { label: "Title line 2",  name: "title_l2",      widget: "string" }
              - { label: "Paragraph 1",   name: "body_p1",       widget: "text"   }
              - { label: "Paragraph 2",   name: "body_p2",       widget: "text"   }
              - { label: "Image",         name: "image",         widget: "image"  }

          - label: "Image gallery"
            name: "gallery"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title",   name: "title",   widget: "string" }
              - label: "Images (add as many as you like)"
                name: "items"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - { label: "Image", name: "image", widget: "image"  }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Meta",  name: "meta",  widget: "string" }

          - label: "Video (two clips)"
            name: "video"
            widget: "object"
            fields:
              - { label: "Section label", name: "section_label", widget: "string" }
              - { label: "Title line 1",  name: "title_l1",      widget: "string" }
              - { label: "Title line 2",  name: "title_l2",      widget: "string" }
              - label: "Clips (up to 2)"
                name: "items"
                widget: "list"
                max: 2
                summary: "{{fields.label}}"
                fields:
                  - { label: "Video file",   name: "src",     widget: "file",   required: false, hint: "MP4 recommended" }
                  - { label: "Poster image", name: "poster",  widget: "image",  required: false }
                  - { label: "Label",        name: "label",   widget: "string", required: false }
                  - { label: "Note",         name: "note",    widget: "string", required: false }
                  - { label: "Caption",      name: "caption", widget: "string", required: false }

          - label: "Closing CTA"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Title line 1", name: "title_l1", widget: "string" }
              - { label: "Title line 2", name: "title_l2", widget: "string" }
              - { label: "Lede",         name: "lede",     widget: "text"   }

  # =============== PRODUCTS (overview) ===============
  - name: "products"
    label: "Products — overview"
    files:
      - file: "content/products.json"
        name: "products"
        label: "Products overview page"
        fields:

          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title",   name: "title",   widget: "string" }
              - { label: "Lede",    name: "lede",    widget: "text"   }

              - { label: "Hero background image", name: "bg_image", widget: "image", required: false }
          - label: "Product rows"
            name: "items"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Tag",  name: "tag",  widget: "string" }
              - { label: "Body", name: "body", widget: "text"   }
              - { label: "Image (optional)", name: "image", widget: "image", required: false }

          - label: "Closing CTA"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Title line 1", name: "title_l1", widget: "string" }
              - { label: "Title line 2", name: "title_l2", widget: "string" }
              - { label: "Lede",         name: "lede",     widget: "text"   }

