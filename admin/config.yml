  # =============== PRODUCT — Mogu (placeholder) ===============
  - name: "mogu"
    label: "Product — Mogu"
    files:
      - file: "content/mogu.json"
        name: "mogu"
        label: "Mogu page"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
