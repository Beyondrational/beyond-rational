# Decap CMS configuration

backend:
  name: github
  repo: Beyondrational/beyond-rational
  branch: main
  # OAuth proxy (Cloudflare Worker) that completes "Login with GitHub".
  # See DECAP-SETUP.md for the full walkthrough.
  base_url: https://br-cms-auth.rasmus-177.workers.dev

media_folder: "assets"
public_folder: "assets"

site_url: https://beyondrational.github.io/beyond-rational
display_url: https://beyondrational.github.io/beyond-rational

collections:

  # =============== SITE-WIDE (shared footer, etc.) ===============
  - name: "site"
    label: "Site settings"
    files:
      - file: "content/site.json"
        name: "site"
        label: "Footer (shown on every page)"
        fields:
          - { label: "Logo (nav + footer, every page)", name: "logo", widget: "image" }
          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Brand tagline", name: "brand_tagline", widget: "text"   }
              - { label: "Email",         name: "email",         widget: "string" }
              - { label: "Address",       name: "address",       widget: "string" }
              - { label: "Copyright",     name: "copyright",     widget: "string" }

  # =============== HOME ===============
  - name: "home"
    label: "Home"
    files:
      - file: "content/home.json"
        name: "home"
        label: "Home page"
        fields:

          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow left",          name: "eyebrow_left",  widget: "string" }
              - { label: "Eyebrow right",         name: "eyebrow_right", widget: "string" }
              - { label: "Title line 1",          name: "title_l1",      widget: "string" }
              - { label: "Title line 2 (emphasised)", name: "title_l2_em", widget: "string" }
              - { label: "Subtitle",              name: "subtitle",      widget: "text"   }
              - { label: "Primary CTA",           name: "cta_primary",   widget: "string" }
              - { label: "Secondary CTA",         name: "cta_secondary", widget: "string" }
              - { label: "Hero background image", name: "bg_image",      widget: "image"  }

          - label: "The range (4-image product grid)"
            name: "range"
            widget: "object"
            fields:
              - { label: "Section label", name: "section_label", widget: "string" }
              - { label: "Meta tag",      name: "meta",          widget: "string" }
              - { label: "Intro",         name: "intro",         widget: "text"   }
              - { label: "Link label",    name: "link_label",    widget: "string" }
              - label: "Products"
                name: "items"
                widget: "list"
                summary: "{{fields.name}}"
                fields:
                  - { label: "Name",  name: "name",  widget: "string" }
                  - { label: "Image", name: "image", widget: "image"  }
                  - { label: "Tag",   name: "tag",   widget: "string", required: false, hint: "Not currently displayed, kept for future use" }
                  - { label: "Link",  name: "href",  widget: "string", hint: "e.g. product-aisti.html, product-wuud.html" }

          - label: "Mission statement"
            name: "process"
            widget: "object"
            fields:
              - { label: "Section label",        name: "section_label", widget: "string" }
              - { label: "Title line 1",         name: "title_l1",      widget: "string" }
              - { label: "Title line 2 (em)",    name: "title_l2_em",   widget: "string" }
              - { label: "Paragraph 1",          name: "body_p1",       widget: "text"   }
              - { label: "Paragraph 2",          name: "body_p2",       widget: "text"   }
              - { label: "Image",                name: "image",         widget: "image"  }

          - label: "Office"
            name: "studio"
            widget: "object"
            fields:
              - { label: "Section label",     name: "section_label", widget: "string" }
              - { label: "Title line 1",      name: "title_l1",      widget: "string" }
              - { label: "Title line 2 (em)", name: "title_l2_em",   widget: "string" }
              - { label: "Founded year",             name: "stat_founded",        widget: "string" }
              - { label: "Founded year — label",     name: "stat_founded_label",  widget: "string" }
              - { label: "Supplier count",           name: "stat_people",         widget: "string" }
              - { label: "Supplier count — label",   name: "stat_people_label",   widget: "string" }
              - { label: "In business since",        name: "stat_studios",        widget: "string" }
              - { label: "In business since — label", name: "stat_studios_label", widget: "string" }
              - { label: "Body",              name: "body",          widget: "text"   }
              - { label: "Image",             name: "image",         widget: "image"  }
              - { label: "Link label",        name: "link_label",    widget: "string", default: "Contact" }

          - label: "Cases"
            name: "cases"
            widget: "object"
            fields:
              - { label: "Section label", name: "section_label", widget: "string" }
              - { label: "Link label",    name: "link_label",    widget: "string" }
              - label: "Items"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Link",    name: "href",    widget: "string", hint: "e.g. case-angtvatten-22.html" }
                  - { label: "Image",   name: "image",   widget: "image", required: false }
                  - { label: "Eyebrow", name: "eyebrow", widget: "string" }
                  - { label: "Title",   name: "title",   widget: "string" }
                  - { label: "Meta 1",  name: "meta1",   widget: "string" }
                  - { label: "Meta 2",  name: "meta2",   widget: "text"   }

          - label: "Closing CTA"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Section label",     name: "section_label", widget: "string" }
              - { label: "Title line 1",      name: "title_l1",      widget: "string" }
              - { label: "Title line 2 (em)", name: "title_l2_em",   widget: "string" }
              - { label: "Body",              name: "body",          widget: "text"   }
              - { label: "Email",             name: "email",         widget: "string" }

  # =============== CONTACT ===============
  - name: "contact-page"
    label: "Contact"
    files:
      - file: "content/contact.json"
        name: "contact-page"
        label: "Contact page"
        fields:

          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow",     name: "eyebrow",  widget: "string" }
              - { label: "Title line 1", name: "title_l1", widget: "string" }
              - { label: "Title line 2", name: "title_l2", widget: "string" }
              - { label: "Lede",        name: "lede",     widget: "text"   }
              - { label: "Hero image",  name: "image",    widget: "image"  }

          - label: "Form section"
            name: "form_section"
            widget: "object"
            fields:
              - { label: "Section label", name: "section_label", widget: "string" }
              - { label: "Title line 1",  name: "title_l1",      widget: "string" }
              - { label: "Title line 2",  name: "title_l2",      widget: "string" }
              - { label: "Intro",         name: "intro",         widget: "text"   }

              - label: "Contact info shown next to forms"
                name: "contact_info"
                widget: "object"
                fields:
                  - { label: "Email",  name: "email",  widget: "string" }
                  - { label: "Phone",  name: "phone",  widget: "string" }
                  - { label: "Office", name: "office", widget: "string" }
                  - { label: "Hours",  name: "hours",  widget: "string" }

              - label: "Tab labels"
                name: "tabs"
                widget: "object"
                fields:
                  - { label: "Sample box tab",  name: "sample",  widget: "string" }
                  - { label: "Specify tab",     name: "specify", widget: "string" }
                  - { label: "Information tab", name: "info",    widget: "string" }
                  - { label: "Other tab",       name: "other",   widget: "string" }

              - label: "Form 1 — Sample box"
                name: "form_sample"
                widget: "object"
                fields:
                  - { label: "Name label",              name: "name_label",          widget: "string" }
                  - { label: "Email label",              name: "email_label",         widget: "string" }
                  - { label: "Phone label",              name: "phone_label",         widget: "string" }
                  - { label: "Company label",            name: "company_label",       widget: "string" }
                  - { label: "Finish label",             name: "finish_label",        widget: "string" }
                  - { label: "Finish placeholder",       name: "finish_placeholder",  widget: "string" }
                  - { label: "Address label",            name: "address_label",       widget: "string" }
                  - { label: "Address placeholder",      name: "address_placeholder", widget: "string" }
                  - { label: "Submit button",            name: "submit_label",        widget: "string" }

              - label: "Form 2 — Specify for project"
                name: "form_specify"
                widget: "object"
                fields:
                  - { label: "Name label",         name: "name_label",         widget: "string" }
                  - { label: "Email label",        name: "email_label",        widget: "string" }
                  - { label: "Role label",         name: "role_label",         widget: "string" }
                  - label: "Role options"
                    name: "role_options"
                    widget: "list"
                    summary: "{{fields.value}}"
                    fields:
                      - { label: "Option", name: "value", widget: "string" }
                  - { label: "Company label",      name: "company_label",      widget: "string" }
                  - { label: "Project name label",  name: "project_label",      widget: "string" }
                  - { label: "Project type label",  name: "type_label",         widget: "string" }
                  - label: "Project type options"
                    name: "type_options"
                    widget: "list"
                    summary: "{{fields.value}}"
                    fields:
                      - { label: "Option", name: "value", widget: "string" }
                  - { label: "Area label",           name: "area_label",         widget: "string" }
                  - { label: "Area placeholder",     name: "area_placeholder",   widget: "string" }
                  - { label: "Deadline label",       name: "deadline_label",     widget: "string" }
                  - { label: "Brief label",          name: "brief_label",        widget: "string" }
                  - { label: "Brief placeholder",    name: "brief_placeholder",  widget: "text"   }
                  - { label: "Submit button",        name: "submit_label",       widget: "string" }

              - label: "Form 3 — Information"
                name: "form_info"
                widget: "object"
                fields:
                  - { label: "Name label",    name: "name_label",    widget: "string" }
                  - { label: "Email label",   name: "email_label",   widget: "string" }
                  - { label: "Company label", name: "company_label", widget: "string" }
                  - { label: "Kind label",    name: "kind_label",    widget: "string" }
                  - label: "Kind options"
                    name: "kind_options"
                    widget: "list"
                    summary: "{{fields.value}}"
                    fields:
                      - { label: "Option", name: "value", widget: "string" }
                  - { label: "Message label",       name: "msg_label",       widget: "string" }
                  - { label: "Message placeholder", name: "msg_placeholder", widget: "string" }
                  - { label: "Submit button",       name: "submit_label",    widget: "string" }

              - label: "Form 4 — Other"
                name: "form_other"
                widget: "object"
                fields:
                  - { label: "Name label",          name: "name_label",       widget: "string" }
                  - { label: "Email label",         name: "email_label",      widget: "string" }
                  - { label: "Company label",       name: "company_label",    widget: "string" }
                  - { label: "Message label",       name: "msg_label",        widget: "string" }
                  - { label: "Message placeholder", name: "msg_placeholder",  widget: "string" }
                  - { label: "Submit button",       name: "submit_label",     widget: "string" }

          - label: "Contact cards"
            name: "contact_cards"
            widget: "object"
            fields:
              - { label: "Section label", name: "section_label", widget: "string" }
              - { label: "Title",         name: "title",         widget: "string" }
              - { label: "Intro",         name: "intro",         widget: "string" }

              - label: "Morten"
                name: "morten"
                widget: "object"
                fields:
                  - { label: "Eyebrow", name: "eyebrow", widget: "string" }
                  - { label: "Name",    name: "name",    widget: "string" }
                  - { label: "Role",    name: "role",    widget: "string" }
                  - { label: "Email",   name: "email",   widget: "string" }
                  - { label: "Phone",   name: "phone",   widget: "string" }
                  - { label: "Photo",   name: "photo",   widget: "image" }

              - label: "Rasmus"
                name: "rasmus"
                widget: "object"
                fields:
                  - { label: "Eyebrow", name: "eyebrow", widget: "string" }
                  - { label: "Name",    name: "name",    widget: "string" }
                  - { label: "Role",    name: "role",    widget: "string" }
                  - { label: "Email",   name: "email",   widget: "string" }
                  - { label: "Phone",   name: "phone",   widget: "string" }
                  - { label: "Photo",   name: "photo",   widget: "image" }

          - label: "Office info (Email / Phone cards)"
            name: "studio_info"
            widget: "object"
            fields:
              - { label: "Title line 1", name: "title_l1",  widget: "string" }
              - { label: "Title line 2", name: "title_l2",  widget: "string" }
              - { label: "Email",        name: "email",      widget: "string" }
              - { label: "Email note",   name: "email_note", widget: "string" }
              - { label: "Phone",        name: "phone",      widget: "string" }
              - { label: "Phone note",   name: "phone_note", widget: "string" }

          - label: "Follow our journey"
            name: "journey"
            widget: "object"
            fields:
              - { label: "Title line 1", name: "title_l1", widget: "string" }
              - { label: "Title line 2", name: "title_l2", widget: "string" }
              - { label: "Body",         name: "body",     widget: "text"   }

  # =============== PROJECTS ===============
  - name: "projects"
    label: "Projects"
    files:
      - file: "content/projects.json"
        name: "projects"
        label: "Projects page"
        fields:

          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow",       name: "eyebrow",   widget: "string" }
              - { label: "Title line 1",  name: "title_l1",  widget: "string" }
              - { label: "Title line 2",  name: "title_l2",  widget: "string" }
              - { label: "Subtitle",      name: "subtitle",  widget: "text"   }

              - { label: "Hero background image", name: "bg_image", widget: "image", required: false }
          - label: "Image gallery (6 cells)"
            name: "gallery"
            widget: "list"
            min: 1
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Meta",  name: "meta",  widget: "string" }

          - label: "Case studies (prose panels)"
            name: "cases"
            widget: "list"
            hint: "The two large text+image case panels further down the page. Order here must match the two panels on the page (case 1 first, case 2 second)."
            fields:
              - { label: "Case label", name: "case_label", widget: "string" }
              - { label: "Country code", name: "country", widget: "string" }
              - { label: "Title",  name: "title", widget: "string" }
              - { label: "Meta line", name: "meta",  widget: "string" }
              - { label: "Body copy", name: "body", widget: "text" }

          - label: "Project list"
            name: "list"
            widget: "list"
            fields:
              - { label: "Number", name: "num",   widget: "string" }
              - { label: "Title",  name: "title", widget: "string" }
              - { label: "Meta",   name: "meta",  widget: "string" }
              - { label: "Year",   name: "year",  widget: "string" }

  # =============== WUUD ===============
  - name: "wuud"
    label: "Wuud"
    files:
      - file: "content/wuud.json"
        name: "wuud"
        label: "Wuud page"
        fields:

          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title",   name: "title",   widget: "string" }
              - { label: "Lede",    name: "lede",    widget: "text"   }
              - { label: "Hero background image", name: "bg_image", widget: "image", required: false }
          - { label: "Hero note (under finishes)", name: "hero_note", widget: "text" }

          - label: "Finish swatches"
            name: "finishes"
            widget: "object"
            hint: "The 4 finishes are fixed (tied to the interactive panel's CSS/colours) — only the display name and code are editable here."
            fields:
              - label: "Graphite"
                name: "graphite"
                widget: "object"
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Code", name: "code", widget: "string" }
              - label: "Birch"
                name: "birch"
                widget: "object"
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Code", name: "code", widget: "string" }
              - label: "Oak"
                name: "oak"
                widget: "object"
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Code", name: "code", widget: "string" }
              - label: "Smoked"
                name: "smoked"
                widget: "object"
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Code", name: "code", widget: "string" }

          - label: "The idea"
            name: "idea"
            widget: "object"
            fields:
              - { label: "Eyebrow",      name: "eyebrow",  widget: "string" }
              - { label: "Title line 1", name: "title_l1", widget: "string" }
              - { label: "Title line 2", name: "title_l2", widget: "string" }
              - label: "Points (3)"
                name: "points"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - { label: "Number", name: "num",   widget: "string" }
                  - { label: "Title",  name: "title", widget: "string" }
                  - { label: "Body",   name: "body",  widget: "text"   }
              - { label: "Species label", name: "species_label", widget: "string" }
              - { label: "Wood species",  name: "species",       widget: "list"   }

          - label: "Gallery heading"
            name: "gallery_head"
            widget: "object"
            fields:
              - { label: "Eyebrow",      name: "eyebrow",  widget: "string" }
              - { label: "Title line 1", name: "title_l1", widget: "string" }
              - { label: "Title line 2", name: "title_l2", widget: "string" }
              - { label: "Body",         name: "body",     widget: "text"   }

          - label: "Image gallery"
            name: "gallery"
            label_singular: "Image"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Title", name: "title", widget: "string", required: false }
              - { label: "Meta",  name: "meta",  widget: "string", required: false }

          - label: "Spec"
            name: "spec"
            widget: "object"
            fields:
              - { label: "Eyebrow",      name: "eyebrow",  widget: "string" }
              - { label: "Title line 1", name: "title_l1", widget: "string" }
              - { label: "Title line 2", name: "title_l2", widget: "string" }
              - label: "Rows"
                name: "rows"
                widget: "list"
                summary: "{{fields.key}}: {{fields.value}}"
                fields:
                  - { label: "Key",   name: "key",   widget: "string" }
                  - { label: "Value", name: "value", widget: "string" }

          - label: "Closing CTA"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Title line 1", name: "title_l1", widget: "string" }
              - { label: "Title line 2", name: "title_l2", widget: "string" }
              - { label: "Lede",         name: "lede",     widget: "text"   }

  # =============== PRODUCT (Aisti tile page) ===============
  - name: "product-aisti"
    label: "Product — Aisti"
    files:
      - file: "content/product-aisti.json"
        name: "product-aisti"
        label: "Product page (Aisti)"
        fields:

          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title",   name: "title",   widget: "string" }
              - { label: "Lede",    name: "lede",    widget: "text"   }

              - { label: "Hero background image", name: "bg_image", widget: "image", required: false }

          - label: "Technology (foam-forming)"
            name: "technology"
            widget: "object"
            fields:
              - { label: "Section label", name: "section_label", widget: "string" }
              - { label: "Title line 1",  name: "title_l1",      widget: "string" }
              - { label: "Title line 2",  name: "title_l2",      widget: "string" }
              - { label: "Paragraph 1",   name: "body_p1",       widget: "text"   }
              - { label: "Paragraph 2",   name: "body_p2",       widget: "text"   }
              - { label: "Image",         name: "image",         widget: "image"  }

          - label: "Image gallery"
            name: "gallery"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title",   name: "title",   widget: "string" }
              - label: "Images (add as many as you like)"
                name: "items"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - { label: "Image", name: "image", widget: "image"  }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Meta",  name: "meta",  widget: "string" }

          - label: "Spec sheet"
            name: "spec"
            widget: "object"
            fields:
              - label: "Rows"
                name: "items"
                widget: "list"
                summary: "{{fields.key}}: {{fields.value}}"
                fields:
                  - { label: "Label", name: "key",   widget: "string" }
                  - { label: "Value", name: "value", widget: "string" }
              - label: "Download buttons"
                name: "downloads"
                widget: "list"
                summary: "{{fields.label}}"
                fields:
                  - { label: "Button text", name: "label", widget: "string" }
                  - { label: "Link (opens in new tab)", name: "href", widget: "string" }

          - label: "Performance data grid — product facts"
            name: "facts"
            widget: "object"
            fields:
              - label: "Format"
                name: "format"
                widget: "object"
                fields:
                  - { label: "Value 1", name: "big1", widget: "string" }
                  - { label: "Value 2", name: "big2", widget: "string" }
                  - { label: "Note",    name: "note", widget: "string" }
              - label: "Thickness"
                name: "thickness"
                widget: "object"
                fields:
                  - { label: "Value 1", name: "big1", widget: "string" }
                  - { label: "Value 2", name: "big2", widget: "string" }
                  - { label: "Note",    name: "note", widget: "string" }
              - label: "Material & life rows"
                name: "material_life"
                widget: "list"
                summary: "{{fields.key}}: {{fields.value}}"
                fields:
                  - { label: "Label", name: "key",   widget: "string" }
                  - { label: "Value", name: "value", widget: "string" }

          - label: "Head-to-head comparison"
            name: "versus"
            widget: "object"
            fields:
              - label: "Our side"
                name: "ours"
                widget: "object"
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Tag",  name: "tag",  widget: "string" }
                  - label: "Points"
                    name: "points"
                    widget: "list"
                    summary: "{{fields.text}}"
                    fields:
                      - { label: "Point", name: "text", widget: "string" }
              - label: "Their side"
                name: "theirs"
                widget: "object"
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Tag",  name: "tag",  widget: "string" }
                  - label: "Points"
                    name: "points"
                    widget: "list"
