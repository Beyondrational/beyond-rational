# Sveltia CMS configuration
# Edit the GitHub repo path below after pushing the site.

backend:
  name: github
  repo: Beyondrational/beyond-rational
  branch: main
  base_url: https://api.netlify.com   # only used if you wire auth via Netlify; otherwise leave default GitHub flow

media_folder: "assets"
public_folder: "assets"

site_url: https://example.com
display_url: https://example.com
logo_url: /assets/logo.svg

collections:

  # =============== HOME ===============
  - name: "home"
    label: "Home"
    files:
      - file: "content/home.json"
        name: "home"
        label: "Home page"
        fields:
          - { label: "Hero — eyebrow left",   name: "hero.eyebrow_left",  widget: "string" }
          - { label: "Hero — eyebrow right",  name: "hero.eyebrow_right", widget: "string" }
          - { label: "Hero — title (line 1)", name: "hero.title_l1",      widget: "string" }
          - { label: "Hero — title (line 2 emphasised)", name: "hero.title_l2_em", widget: "string" }
          - { label: "Hero — subtitle",       name: "hero.subtitle",      widget: "text"   }
          - { label: "Hero — primary CTA",    name: "hero.cta_primary",   widget: "string" }
          - { label: "Hero — secondary CTA",  name: "hero.cta_secondary", widget: "string" }

          - { label: "Manifesto — section label", name: "manifesto.section_label", widget: "string" }
          - label: "Manifesto items"
            name: "manifesto.items"
            widget: "list"
            fields:
              - { label: "Number",  name: "num",       widget: "string" }
              - { label: "Pre",     name: "text_pre",  widget: "string" }
              - { label: "Emphasis",name: "text_em",   widget: "string" }
              - { label: "Post",    name: "text_post", widget: "string", required: false }

          - { label: "What we make — section label", name: "what_we_make.section_label", widget: "string" }
          - { label: "What we make — body",          name: "what_we_make.body",          widget: "text"   }

          - { label: "Process — section label", name: "process.section_label", widget: "string" }
          - { label: "Process — title line 1",  name: "process.title_l1",      widget: "string" }
          - { label: "Process — title line 2 (em)", name: "process.title_l2_em", widget: "string" }
          - { label: "Process — paragraph 1",   name: "process.body_p1",       widget: "text"   }
          - { label: "Process — paragraph 2",   name: "process.body_p2",       widget: "text"   }

          - { label: "Studio — section label",  name: "studio.section_label", widget: "string" }
          - { label: "Studio — title line 1",   name: "studio.title_l1",      widget: "string" }
          - { label: "Studio — title line 2 (em)", name: "studio.title_l2_em", widget: "string" }
          - { label: "Studio — founded year",   name: "studio.stat_founded",  widget: "string" }
          - { label: "Studio — people count",   name: "studio.stat_people",   widget: "string" }
          - { label: "Studio — locations",      name: "studio.stat_studios",  widget: "string" }
          - { label: "Studio — body",           name: "studio.body",          widget: "text"   }

          - { label: "Closing CTA — section label", name: "cta.section_label", widget: "string" }
          - { label: "Closing CTA — title line 1",  name: "cta.title_l1",      widget: "string" }
          - { label: "Closing CTA — title line 2 (em)", name: "cta.title_l2_em", widget: "string" }
          - { label: "Closing CTA — body",          name: "cta.body",          widget: "text"   }
          - { label: "Closing CTA — email",         name: "cta.email",         widget: "string" }

  # =============== FOUNDERS ===============
  - name: "founders"
    label: "Founders"
    files:
      - file: "content/founders.json"
        name: "founders"
        label: "Founders"
        fields:
          - { label: "Section label", name: "section_label", widget: "string" }
          - { label: "Title line 1",  name: "title_l1",      widget: "string" }
          - { label: "Title line 2",  name: "title_l2",      widget: "string" }
          - { label: "Intro",         name: "intro",         widget: "text"   }

          - label: "Morten"
            name: "morten"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Name",    name: "name",    widget: "string" }
              - { label: "Role",    name: "role",    widget: "string" }
              - { label: "Email",   name: "email",   widget: "string" }
              - { label: "Phone",   name: "phone",   widget: "string" }
              - { label: "Photo",   name: "photo",   widget: "image" }

          - label: "Rasmus"
            name: "rasmus"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Name",    name: "name",    widget: "string" }
              - { label: "Role",    name: "role",    widget: "string" }
              - { label: "Email",   name: "email",   widget: "string" }
              - { label: "Studio",  name: "studio",  widget: "string" }
              - { label: "Photo",   name: "photo",   widget: "image" }

  # =============== PROJECTS ===============
  - name: "projects"
    label: "Projects"
    files:
      - file: "content/projects.json"
        name: "projects"
        label: "Projects page"
        fields:
          - { label: "Hero — eyebrow",  name: "hero.eyebrow", widget: "string" }
          - { label: "Hero — title line 1", name: "hero.title_l1", widget: "string" }
          - { label: "Hero — title line 2", name: "hero.title_l2", widget: "string" }
          - { label: "Hero — subtitle",     name: "hero.subtitle", widget: "text"   }

          - label: "Image gallery (6 cells)"
            name: "gallery"
            widget: "list"
            min: 1
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Meta",  name: "meta",  widget: "string" }

          - label: "Project list"
            name: "list"
            widget: "list"
            fields:
              - { label: "Number", name: "num",   widget: "string" }
              - { label: "Title",  name: "title", widget: "string" }
              - { label: "Meta",   name: "meta",  widget: "string" }
              - { label: "Year",   name: "year",  widget: "string" }
